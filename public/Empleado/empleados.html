<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Empleado - Olive HRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <aside
      class="fixed top-0 left-0 h-screen w-64 bg-gray-900 text-white flex-col shadow-lg flex"
    >
      <div class="flex items-center gap-3 p-6 border-b border-gray-700">
        <img src="../logo.png" alt="Logo" width="40" />
        <h1 class="text-xl font-bold text-gray-100">Olive HRM</h1>
      </div>
      <nav class="flex flex-col mt-6 space-y-2 px-6 text-sm">
        <a
          href="empleados.html"
          class="bg-blue-900 rounded-lg px-3 py-2 flex items-center gap-2"
        >
          <span>🏠</span> Mi Dashboard
        </a>

        <a
          href="../perfil.html"
          class="hover:bg-gray-800 rounded-lg px-3 py-2 flex items-center gap-2 transition-all"
        >
          <span>👤</span> Mi Perfil
        </a>

        <button
          id="btn-logout"
          class="flex items-center gap-2 p-3 mt-10 rounded-lg text-red-400 hover:bg-gray-800 hover:text-red-300 transition-all"
        >
          <span>🚪</span> <span>Cerrar Sesión</span>
        </button>
      </nav>
    </aside>

    <main class="ml-64 p-6">
      <section
        class="mb-8 bg-white shadow-md rounded-lg p-6 border-l-4 border-blue-900"
      >
        <h2 class="text-xl font-bold text-gray-800 mb-2">
          Bienvenido,
          <span id="nombre-empleado" class="text-blue-900">Cargando...</span>
        </h2>
        <div class="flex gap-6 text-sm text-gray-600">
          <p>
            Puesto:
            <span id="puesto-empleado" class="font-bold text-gray-800"
              >---</span
            >
          </p>
          <p>
            Departamento:
            <span id="depto-empleado" class="font-bold text-gray-800">---</span>
          </p>
        </div>
      </section>

      <section class="bg-white shadow-md rounded-lg p-6">
        <h2
          class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2"
        >
          <span>📂</span> Mis Proyectos Asignados
        </h2>
        <div class="overflow-x-auto">
          <table class="table-auto w-full border-collapse">
            <thead class="bg-gray-100 text-gray-700 uppercase text-xs">
              <tr>
                <th class="py-3 px-4 border-b text-left">Proyecto</th>
                <th class="py-3 px-4 border-b text-left">Cliente</th>
                <th class="py-3 px-4 border-b">Estado</th>
                <th class="py-3 px-4 border-b">Entrega</th>
              </tr>
            </thead>
            <tbody id="tabla-proyectos" class="text-sm">
              <tr>
                <td colspan="4" class="py-8 text-center text-gray-400 italic">
                  Buscando asignaciones...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="../js/config.js"></script>
    <script type="module" src="empleado_view.js"></script>
    <script type="module" src="../logout.js"></script>
  </body>
</html>
