<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logros del Empleado - Olive HRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-gray-900 text-white shadow-md">
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <img src="../logo.png" alt="Logo" class="h-10 w-10" />
          <h1 class="text-xl font-bold">Olive HRM</h1>
        </div>
        <nav class="hidden md:flex gap-6 text-sm">
          <a href="../Empleado/empleados.html" class="hover:text-gray-300"
            >Dashboard</a
          >
          <a href="../perfil.html" class="hover:text-gray-300">Perfil</a>
          <button id="btn-logout-top" class="hover:text-red-400 transition">
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto p-6 w-full">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-blue-900">
          Mis Logros y Reconocimientos
        </h2>
        <a
          href="../Empleado/empleados.html"
          class="text-blue-600 hover:underline text-sm font-medium"
        >
          ← Volver al Dashboard
        </a>
      </div>

      <p class="text-gray-600 mb-8 text-sm">
        Reconocimientos, certificaciones y metas alcanzadas dentro de la
        organización.
      </p>

      <div
        id="contenedor-logros-real"
        class="grid grid-cols-1 md:grid-cols-3 gap-6"
      >
        <div class="col-span-full text-center py-12">
          <p class="text-gray-500 animate-pulse">
            Cargando tu vitrina de trofeos...
          </p>
        </div>
      </div>
    </main>

    <footer class="bg-gray-900 text-white py-4 mt-auto">
      <div class="max-w-6xl mx-auto px-6 flex justify-between text-xs">
        <span>© 2026 Olive HRM. Todos los derechos reservados.</span>
        <span class="text-gray-400">Panel de Empleados</span>
      </div>
    </footer>

    <script type="module">
      import { db, auth } from "../js/config.js";
      import {
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
      import {
        collection,
        query,
        where,
        getDocs,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      const contenedor = document.getElementById("contenedor-logros-real");

      // 1. ESCUCHA DE ESTADO DE AUTENTICACIÓN
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          console.warn("Usuario no autenticado. Redirigiendo...");
          // Usamos replace para que no pueda volver atrás
          window.location.replace("../index.html");
        } else {
          console.log("Usuario detectado:", user.email);
          cargarLogros(user);
        }
      });

      // 2. FUNCIÓN PARA CARGAR DATOS
      async function cargarLogros(user) {
        try {
          // Obtener nombre del empleado
          const qEmp = query(
            collection(db, "empleados"),
            where("email", "==", user.email),
          );
          const empSnap = await getDocs(qEmp);

          let miNombre = "";
          empSnap.forEach((doc) => {
            miNombre = doc.data().nombre;
          });

          if (!miNombre) {
            contenedor.innerHTML = `<p class="col-span-full text-center text-red-500">Error: Perfil no encontrado en la base de datos.</p>`;
            return;
          }

          // Escuchar logros en tiempo real
          const qLogros = query(
            collection(db, "logros"),
            where("receptor", "==", miNombre),
          );

          onSnapshot(qLogros, (snapshot) => {
            contenedor.innerHTML = "";

            if (snapshot.empty) {
              contenedor.innerHTML = `
                <div class="col-span-full bg-white rounded-xl p-10 text-center shadow border border-gray-200">
                  <p class="text-gray-500 italic">Aún no tienes logros registrados.</p>
                </div>`;
              return;
            }

            snapshot.forEach((doc) => {
              const logro = doc.data();
              contenedor.innerHTML += `
                <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition border-t-4 border-yellow-500 flex flex-col">
                  <div class="text-4xl mb-4">${logro.icono || "🏆"}</div>
                  <h3 class="text-lg font-bold text-gray-800 mb-2">${logro.titulo}</h3>
                  <p class="text-sm text-gray-600 mb-4 flex-grow">${logro.descripcion}</p>
                  <div class="text-xs text-gray-500 space-y-1 border-t pt-3">
                    <p><span class="font-semibold text-blue-900 uppercase">Fecha:</span> ${logro.fecha || "Reciente"}</p>
                  </div>
                </div>`;
            });
          });
        } catch (error) {
          console.error("Error crítico en logros:", error);
          contenedor.innerHTML = `<p class="col-span-full text-center text-red-400 font-medium">Error de conexión con la base de datos.</p>`;
        }
      }

      // 3. LOGOUT FUNCIONAL
      document
        .getElementById("btn-logout-top")
        ?.addEventListener("click", async () => {
          try {
            await signOut(auth);
            window.location.replace("../index.html");
          } catch (error) {
            console.error("Error al cerrar sesión:", error);
          }
        });
    </script>
  </body>
</html>
