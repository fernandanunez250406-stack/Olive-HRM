<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Proyectos - Olive HRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-gray-900 text-white p-4 shadow-md">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-400">Olive HRM - Proyectos</h1>
        <a href="../Empleado/empleados.html" class="text-sm hover:underline"
          >Volver al Dashboard</a
        >
      </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto p-6 w-full">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Mis Asignaciones</h2>
        <p class="text-gray-600">
          Proyectos actuales donde participas activamente.
        </p>
      </div>

      <div
        id="contenedor-proyectos"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
      >
        <div class="col-span-full text-center py-10">
          <p class="animate-pulse text-gray-500">
            Identificando usuario y cargando proyectos...
          </p>
        </div>
      </div>
    </main>

    <script type="module">
      import { db, auth } from "../js/config.js";
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
      import {
        collection,
        query,
        where,
        getDocs,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      const contenedor = document.getElementById("contenedor-proyectos");

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.replace("../index.html");
          return;
        }

        try {
          // PASO 1: Buscar el nombre real del empleado logueado
          const qEmp = query(
            collection(db, "empleados"),
            where("email", "==", user.email),
          );
          const empSnap = await getDocs(qEmp);

          let nombreEmpleado = "";
          empSnap.forEach((doc) => (nombreEmpleado = doc.data().nombre));

          if (!nombreEmpleado) {
            contenedor.innerHTML =
              "<p class='text-red-500'>Error: No se encontró perfil de empleado.</p>";
            return;
          }

          // PASO 2: Filtrar proyectos por el nombre obtenido
          const qProy = query(
            collection(db, "proyectos"),
            where("asignadoA", "==", nombreEmpleado),
          );

          onSnapshot(qProy, (snapshot) => {
            contenedor.innerHTML = "";

            if (snapshot.empty) {
              contenedor.innerHTML = `
                            <div class="col-span-full bg-white p-10 rounded-xl shadow text-center">
                                <p class="text-gray-500 italic">No tienes proyectos asignados actualmente.</p>
                            </div>`;
              return;
            }

            snapshot.forEach((doc) => {
              const p = doc.data();
              const colorEstado =
                p.estado === "Completado"
                  ? "bg-green-100 text-green-700"
                  : "bg-blue-100 text-blue-700";

              contenedor.innerHTML += `
                            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-600 hover:shadow-lg transition">
                                <div class="flex justify-between items-start mb-4">
                                    <h3 class="font-bold text-lg text-gray-800">${p.nombreProyecto}</h3>
                                    <span class="text-xs font-bold px-2 py-1 rounded ${colorEstado}">${p.estado || "En curso"}</span>
                                </div>
                                <p class="text-sm text-gray-600 mb-4">${p.descripcion || "Sin descripción disponible."}</p>
                                <div class="text-xs text-gray-400 border-t pt-3">
                                    <p>📅 Entrega: ${p.fechaEntrega || "Pendiente"}</p>
                                    <p>👤 Responsable: ${p.asignadoA}</p>
                                </div>
                            </div>`;
            });
          });
        } catch (error) {
          console.error("Error:", error);
          contenedor.innerHTML =
            "<p class='text-red-500'>Error al conectar con la base de datos.</p>";
        }
      });
    </script>
  </body>
</html>
